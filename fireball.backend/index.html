<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireball</title>
  <meta name="description" content="A rapid and strategic alternative to Rock-Paper-Scissors">
  <link rel="icon" type="image/svg+xml" href="/fireball_logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&display=swap"
    rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>


  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    window.initFirebase = async function () {
      try {
        const res = await fetch('/api/auth?action=firebase_config');
        const config = await res.json();

        if (config.error) {
          console.warn('Firebase client config not available, falling back to polling');
          window.firebaseApp = null;
          window.firestoreDb = null;
          return;
        }

        window.firebaseApp = initializeApp(config);
        window.firestoreDb = getFirestore(window.firebaseApp);
        console.log('Firebase initialized for real-time listeners');
      } catch (e) {
        console.warn('Failed to initialize Firebase client:', e);
        window.firebaseApp = null;
        window.firestoreDb = null;
      }
    };

    window.initFirebase();
  </script>

  <style>
    :root {
      --fire-red: #dc2626;
      --fire-orange: #ea580c;
      --fire-amber: #f59e0b;
      --accent-purple: #7c3aed;
      --accent-indigo: #4f46e5;
      --bg-primary: #0c0a14;
      --bg-secondary: #14101f;
      --bg-card: #1a1528;
      --bg-card-hover: #221d32;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-subtle: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .app {
      min-height: 100vh;
      padding: 2rem;
    }

    .home-container {
      min-height: calc(100vh - 4rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12vh;
      gap: 3rem;
    }

    .home-header {
      text-align: center;
    }

    .home-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
    }

    .home-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--fire-red), var(--fire-orange), var(--fire-amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .home-subtitle {
      color: var(--text-secondary);
      font-size: 1.125rem;
      margin-top: 0.5rem;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
    }

    .home-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .home-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      border-color: var(--fire-orange);
    }

    /* Static version without hover effects for admin panels */
    .home-card-static {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: default;
    }

    .home-card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .home-card-desc {
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }

    .admin-trigger {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      width: 32px;
      height: 32px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .admin-trigger:hover {
      opacity: 1;
    }

    .game-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .game-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .game-logo {
      width: 48px;
      height: 48px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .game-logo:hover {
      transform: scale(1.05);
    }

    .game-title {
      font-size: 1.75rem;
      font-weight: 700;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9375rem;
      font-family: inherit;
      margin-left: auto;
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    .charge-display {
      display: flex;
      justify-content: space-between;
      padding: 2rem 3rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      margin-bottom: 2rem;
    }

    .charge-block {
      text-align: center;
      flex: 1;
    }

    .charge-label {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .charge-value {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
    }

    .player-charge .charge-label {
      color: var(--fire-orange);
    }

    .opponent-charge .charge-label {
      color: var(--accent-purple);
    }

    .moves-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
    }

    .move-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 0.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .move-btn:hover:not(:disabled) {
      background: var(--bg-card-hover);
      border-color: var(--fire-orange);
    }

    .move-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .move-btn.selected {
      border: 2px solid var(--fire-orange);
      background: var(--bg-card-hover);
      opacity: 1 !important;
      box-shadow: 0 0 10px rgba(234, 88, 12, 0.2);
    }

    .move-btn.faded {
      opacity: 0.2;
      filter: grayscale(1);
      transform: scale(0.95);
    }

    .move-btn .cost {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .history-section {
      margin-top: 2.5rem;
    }

    .history-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      font-size: 0.875rem;
    }

    .history-item span {
      color: var(--text-secondary);
    }

    .history-item .you {
      color: var(--fire-orange);
    }

    .history-item .opp {
      color: var(--accent-purple);
    }

    .end-game-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, rgba(15, 15, 20, 0.95), rgba(10, 10, 15, 0.95));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid;
      border-radius: 24px;
      padding: 0;
      text-align: center;
      z-index: 10000;
      box-shadow:
        0 25px 70px rgba(0, 0, 0, 0.6),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      animation: slideDownBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 380px;
      max-width: 420px;
    }

    @keyframes slideDownBounce {
      0% {
        transform: translate(-50%, -60%);
        opacity: 0;
      }

      100% {
        transform: translate(-50%, -50%);
        opacity: 1;
      }
    }

    .end-game-overlay.win {
      border-color: var(--fire-orange);
      box-shadow:
        0 25px 70px rgba(0, 0, 0, 0.6),
        0 0 50px rgba(234, 88, 12, 0.25),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .end-game-overlay.lose {
      border-color: rgba(150, 150, 170, 0.4);
    }

    .end-game-content {
      padding: 2.5rem 2rem 2rem;
    }

    .end-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: iconPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
      line-height: 1;
    }

    @keyframes iconPop {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .end-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.02em;
    }

    .end-title.win {
      color: var(--fire-orange);
      text-shadow: 0 0 30px rgba(234, 88, 12, 0.4);
    }

    .end-title.lose {
      color: var(--text-muted);
    }

    .end-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      margin: 0 0 2rem 0;
    }

    .end-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .end-actions .btn {
      flex: 1;
      max-width: 160px;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
    }

    .play-again-btn {
      position: relative;
      overflow: hidden;
    }

    .play-again-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .play-again-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .close-overlay-btn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .close-overlay-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
      transform: scale(1.1);
    }

    .close-overlay-btn:active {
      transform: scale(0.95);
    }

    .play-again-header {
      margin-top: 1rem;
    }

    @keyframes slideDown {
      from {
        transform: translate(-50%, -60%);
        opacity: 0;
      }

      to {
        transform: translate(-50%, -50%);
        opacity: 1;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .end-game {
      text-align: center;
      padding: 3rem 2rem;
    }

    .end-title {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .end-title.win {
      color: var(--fire-orange);
      text-shadow: 0 0 30px rgba(234, 88, 12, 0.5);
    }

    .end-title.lose {
      color: var(--text-secondary);
    }

    .end-subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .btn {
      padding: 1rem 2rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--fire-red), var(--fire-orange));
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }

    .guide-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .guide-content {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 2.5rem;
    }

    .guide-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .guide-content h3 {
      font-size: 1.125rem;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--fire-orange);
    }

    .guide-content p {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .guide-content ul {
      list-style: none;
      padding: 0;
    }

    .guide-content li {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .guide-content li:last-child {
      border-bottom: none;
    }

    .guide-content strong {
      color: var(--text-primary);
    }

    /* 1v1 */
    .matchmaking-status {
      text-align: center;
      padding: 3rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
    }

    .matchmaking-status p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .input-field {
      width: 100%;
      max-width: 300px;
      padding: 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent-purple);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 2rem;
      max-width: 500px;
      width: 90%;
    }

    .modal h3 {
      margin-bottom: 1.5rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      font-weight: 700;
    }

    .alert {
      padding: 1rem;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      margin-bottom: 1.5rem;
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid var(--bg-secondary);
      border-top-color: var(--fire-orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .waiting-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      margin-top: 1.5rem;
    }

    .waiting-text {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-top: 1rem;
      animation: fade-pulse 1.5s ease-in-out infinite;
    }

    @keyframes fade-pulse {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }

    .waiting-dots {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .waiting-dots span {
      width: 10px;
      height: 10px;
      background: var(--fire-orange);
      border-radius: 50%;
      animation: bounce-dot 1.4s ease-in-out infinite;
    }

    .waiting-dots span:nth-child(1) {
      animation-delay: 0s;
    }

    .waiting-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .waiting-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce-dot {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    .warning-box {
      padding: 1rem;
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.4);
      border-radius: 4px;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-top: 1.5rem;
      text-align: center;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .disconnected-overlay {
      text-align: center;
      padding: 3rem;
      background: var(--bg-card);
      border: 1px solid rgba(220, 38, 38, 0.4);
    }

    .disconnected-overlay h2 {
      color: #fca5a5;
      margin-bottom: 1rem;
    }

    .disconnected-overlay p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
      .app {
        padding: 1rem;
      }

      .home-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .home-title {
        font-size: 2rem;
      }

      .moves-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .charge-display {
        padding: 1.5rem;
      }

      .charge-value {
        font-size: 3rem;
      }

      .guide-content {
        padding: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .moves-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
