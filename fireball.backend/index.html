<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireball</title>
  <meta name="description" content="A rapid and strategic alternative to Rock-Paper-Scissors">
  <link rel="icon" type="image/svg+xml" href="/fireball_logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>


  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    window.initFirebase = async function () {
      try {
        const res = await fetch('/api/auth?action=firebase_config');
        const config = await res.json();

        if (config.error) {
          console.warn('Firebase client config not available, falling back to polling');
          window.firebaseApp = null;
          window.firestoreDb = null;
          return;
        }

        window.firebaseApp = initializeApp(config);
        window.firestoreDb = getFirestore(window.firebaseApp);
        console.log('Firebase initialized for real-time listeners');
      } catch (e) {
        console.warn('Failed to initialize Firebase client:', e);
        window.firebaseApp = null;
        window.firestoreDb = null;
      }
    };

    window.initFirebase();
  </script>

  <style>
    /* ── Design Tokens ── */
    :root {
      --color-bg: #111010;
      --color-surface-1: #181615;
      --color-surface-2: #201e1c;
      --color-surface-3: #2a2725;
      --color-border: #302c29;
      --color-border-subtle: #252220;

      --color-text: #e8e4df;
      --color-text-2: #a09890;
      --color-text-3: #6b6560;

      --color-accent: #d4603a;
      --color-accent-hover: #c0522e;
      --color-accent-subtle: rgba(212, 96, 58, 0.12);
      --color-warm: #c49a6c;
      --color-green: #5a9a6b;
      --color-red: #c45c5c;

      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --radius: 6px;

      /* 8pt spacing scale */
      --sp-1: 8px;
      --sp-2: 16px;
      --sp-3: 24px;
      --sp-4: 32px;
      --sp-5: 40px;
      --sp-6: 48px;
      --sp-8: 64px;
      --sp-12: 96px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      line-height: 1.55;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      min-height: 100vh;
      padding: var(--sp-4);
    }

    /* ── Homepage ── */
    .home-container {
      min-height: calc(100vh - var(--sp-8));
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 12vh;
      gap: var(--sp-5);
      max-width: 880px;
      margin: 0 auto;
    }

    .home-header {
      text-align: left;
    }

    .home-logo {
      width: 56px;
      height: 56px;
      margin-bottom: var(--sp-2);
    }

    .home-title {
      font-size: clamp(2.2rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--color-accent);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .home-subtitle {
      color: var(--color-text-2);
      font-size: 1rem;
      margin-top: var(--sp-1);
      max-width: 40ch;
      line-height: 1.5;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: var(--sp-2);
      width: 100%;
    }

    .home-card {
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-3);
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .home-card:hover {
      background: var(--color-surface-2);
      border-color: var(--color-border);
    }

    .home-card:first-child {
      grid-row: span 1;
    }

    /* Static version without hover effects for admin panels */
    .home-card-static {
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-3);
      text-align: left;
      cursor: default;
    }

    .home-card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: var(--sp-1);
      letter-spacing: -0.01em;
    }

    .home-card-desc {
      color: var(--color-text-3);
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .admin-trigger {
      position: fixed;
      bottom: var(--sp-2);
      right: var(--sp-2);
      width: 32px;
      height: 32px;
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-3);
      font-size: 0.75rem;
    }

    .admin-trigger:hover {
      opacity: 1;
    }

    /* ── Game Layout ── */
    .game-container {
      max-width: 640px;
      margin: 0 auto;
    }

    .game-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .game-logo {
      width: 40px;
      height: 40px;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .game-logo:hover {
      opacity: 0.7;
    }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--color-text-3);
      cursor: pointer;
      font-size: 0.875rem;
      font-family: inherit;
      margin-left: auto;
      transition: color 0.15s ease;
    }

    .back-btn:hover {
      color: var(--color-text);
    }

    /* ── Charge Display ── */
    .charge-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      margin-bottom: var(--sp-3);
    }

    .charge-block {
      text-align: center;
      flex: 1;
    }

    .charge-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-text-3);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .charge-value {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .player-charge .charge-label {
      color: var(--color-accent);
    }

    .opponent-charge .charge-label {
      color: var(--color-warm);
    }

    /* ── Move Buttons ── */
    .moves-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--sp-1);
    }

    .move-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: var(--sp-2) var(--sp-1);
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      color: var(--color-text);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }

    .move-btn:hover:not(:disabled) {
      background: var(--color-surface-2);
      border-color: var(--color-border);
    }

    .move-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .move-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .move-btn.selected {
      border: 2px solid var(--color-accent);
      background: var(--color-accent-subtle);
      opacity: 1 !important;
    }

    .move-btn.faded {
      opacity: 0.15;
      filter: grayscale(1);
    }

    .move-btn .cost {
      font-size: 0.75rem;
      color: var(--color-text-3);
      font-weight: 400;
    }

    /* ── History ── */
    .history-section {
      margin-top: var(--sp-4);
    }

    .history-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text-3);
      margin-bottom: var(--sp-1);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 10px var(--sp-2);
      background: var(--color-surface-1);
      border-radius: var(--radius);
      font-size: 0.8125rem;
    }

    .history-item span {
      color: var(--color-text-2);
    }

    .history-item .you {
      color: var(--color-accent);
    }

    .history-item .opp {
      color: var(--color-warm);
    }

    /* ── End Game Overlay (1v1) ── */
    .end-game-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--color-surface-1);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 0;
      text-align: center;
      z-index: 10000;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: overlayFadeIn 0.25s ease-out;
      min-width: 360px;
      max-width: 400px;
    }

    @keyframes overlayFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -48%);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    .end-game-overlay.win {
      border-color: var(--color-accent);
    }

    .end-game-overlay.lose {
      border-color: var(--color-border);
    }

    .end-game-content {
      padding: var(--sp-4) var(--sp-3);
    }

    .end-icon {
      font-size: 4rem;
      margin-bottom: var(--sp-2);
      line-height: 1;
    }

    .end-title {
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 var(--sp-1) 0;
      letter-spacing: -0.03em;
    }

    .end-title.win {
      color: var(--color-accent);
    }

    .end-title.lose {
      color: var(--color-text-3);
    }

    .end-subtitle {
      color: var(--color-text-2);
      font-size: 0.9375rem;
      margin: 0 0 var(--sp-3) 0;
    }

    .end-actions {
      display: flex;
      gap: var(--sp-1);
      justify-content: center;
    }

    .end-actions .btn {
      flex: 1;
      max-width: 160px;
      padding: 12px var(--sp-2);
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .play-again-btn {
      position: relative;
      overflow: hidden;
    }

    .close-overlay-btn {
      position: absolute;
      top: var(--sp-2);
      right: var(--sp-2);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      color: var(--color-text-3);
      font-size: 1rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      transition: color 0.15s ease;
      z-index: 10;
    }

    .close-overlay-btn:hover {
      color: var(--color-text);
    }

    .play-again-header {
      margin-top: var(--sp-1);
    }

    /* ── End Game (inline, Play vs AI) ── */
    .end-game {
      text-align: center;
      padding: var(--sp-6) var(--sp-3);
    }

    .end-game .end-title {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: var(--sp-1);
      letter-spacing: -0.03em;
    }

    .end-game .end-title.win {
      color: var(--color-accent);
    }

    .end-game .end-title.lose {
      color: var(--color-text-2);
    }

    .end-game .end-subtitle {
      color: var(--color-text-2);
      margin-bottom: var(--sp-3);
    }

    /* ── Buttons ── */
    .btn {
      padding: 12px var(--sp-3);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary {
      background: var(--color-accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--color-accent-hover);
    }

    .btn-secondary {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      color: var(--color-text);
    }

    .btn-secondary:hover {
      background: var(--color-surface-3);
    }

    /* ── Guide Page ── */
    .guide-container {
      max-width: 640px;
      margin: 0 auto;
    }

    .guide-content {
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      padding: var(--sp-4);
    }

    .guide-content h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: var(--sp-2);
      letter-spacing: -0.02em;
    }

    .guide-content h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-top: var(--sp-4);
      margin-bottom: var(--sp-1);
      color: var(--color-accent);
    }

    .guide-content p {
      color: var(--color-text-2);
      margin-bottom: var(--sp-2);
      max-width: 60ch;
      line-height: 1.6;
    }

    .guide-content ul {
      list-style: none;
      padding: 0;
    }

    .guide-content li {
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border-subtle);
      color: var(--color-text-2);
      line-height: 1.5;
    }

    .guide-content li:last-child {
      border-bottom: none;
    }

    .guide-content strong {
      color: var(--color-text);
    }

    /* ── Matchmaking / 1v1 ── */
    .matchmaking-status {
      text-align: center;
      padding: var(--sp-6) var(--sp-3);
      background: var(--color-surface-1);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
    }

    .matchmaking-status p {
      color: var(--color-text-2);
      margin-bottom: var(--sp-2);
    }

    .input-field {
      width: 100%;
      max-width: 300px;
      padding: 12px var(--sp-2);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text);
      font-family: inherit;
      font-size: 0.9375rem;
      margin-bottom: var(--sp-2);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--color-surface-1);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      max-width: 500px;
      width: 90%;
    }

    .modal h3 {
      margin-bottom: var(--sp-2);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: var(--color-text-2);
    }

    .stat-value {
      font-weight: 700;
    }

    .alert {
      padding: var(--sp-2);
      background: rgba(196, 92, 92, 0.1);
      border: 1px solid rgba(196, 92, 92, 0.25);
      border-radius: var(--radius);
      color: #e8a0a0;
      margin-bottom: var(--sp-2);
      font-size: 0.875rem;
    }

    .loader {
      width: 28px;
      height: 28px;
      border: 2px solid var(--color-surface-3);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: var(--sp-3) auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      color: var(--color-text-2);
      margin-bottom: var(--sp-2);
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: var(--color-green);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .waiting-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-3);
      margin-top: var(--sp-2);
    }

    .waiting-text {
      color: var(--color-text-3);
      font-size: 0.875rem;
      margin-top: var(--sp-1);
      animation: fade-pulse 1.5s ease-in-out infinite;
    }

    @keyframes fade-pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .waiting-dots {
      display: flex;
      gap: 6px;
      margin-top: var(--sp-1);
    }

    .waiting-dots span {
      width: 8px;
      height: 8px;
      background: var(--color-text-3);
      border-radius: 50%;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }

    .waiting-dots span:nth-child(1) {
      animation-delay: 0s;
    }

    .waiting-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .waiting-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes dot-pulse {

      0%,
      80%,
      100% {
        opacity: 0.25;
      }

      40% {
        opacity: 1;
      }
    }

    .warning-box {
      padding: var(--sp-2);
      background: rgba(196, 92, 92, 0.08);
      border: 1px solid rgba(196, 92, 92, 0.2);
      border-radius: var(--radius);
      color: #e8a0a0;
      font-size: 0.8125rem;
      margin-top: var(--sp-2);
      text-align: center;
    }

    .disconnected-overlay {
      text-align: center;
      padding: var(--sp-6) var(--sp-3);
      background: var(--color-surface-1);
      border: 1px solid rgba(196, 92, 92, 0.25);
      border-radius: var(--radius);
    }

    .disconnected-overlay h2 {
      color: var(--color-red);
      margin-bottom: var(--sp-1);
      font-weight: 700;
    }

    .disconnected-overlay p {
      color: var(--color-text-2);
      margin-bottom: var(--sp-3);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-surface-3);
      border-radius: 3px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .app {
        padding: var(--sp-2);
      }

      .home-container {
        padding-top: 8vh;
        gap: var(--sp-3);
      }

      .home-grid {
        grid-template-columns: 1fr;
        gap: var(--sp-1);
      }

      .home-title {
        font-size: 2rem;
      }

      .moves-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .charge-display {
        padding: var(--sp-2) var(--sp-3);
      }

      .charge-value {
        font-size: 2.4rem;
      }

      .guide-content {
        padding: var(--sp-3);
      }

      .end-game-overlay {
        min-width: auto;
        max-width: calc(100vw - var(--sp-4));
        width: calc(100vw - var(--sp-4));
      }
    }

    @media (max-width: 480px) {
      .moves-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>


  <script>
    const {
      useState,
      useEffect,
      useCallback,
      useRef
    } = React;
    const {
      createRoot
    } = ReactDOM;
    const getAdminToken = () => sessionStorage.getItem('fireball_admin_token');
    const setAdminToken = token => sessionStorage.setItem('fireball_admin_token', token);
    const clearAdminToken = () => sessionStorage.removeItem('fireball_admin_token');
    const MOVES = [{
      id: 'charge',
      name: 'Charge',
      cost: 0,
      costDisplay: '+1'
    }, {
      id: 'shield',
      name: 'Shield',
      cost: 0,
      costDisplay: '0'
    }, {
      id: 'fireball',
      name: 'Fireball',
      cost: 1,
